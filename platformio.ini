; Motor CAN Sniffer — ESP32 dahili TWAI + SN65HVD230
; (MCP2515 YOK — bkz. README: ESP32'nin icindeki CAN kontrolcusu kullanilir)
[env:esp32dev]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = time
